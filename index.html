<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--surface:#151821;--surface2:#1e2231;--border:#2a2f42;
  --text:#dfe3ef;--dim:#6d7490;--bright:#f4f5fb;--accent:#5ea2f7;
  --red:#e05252;--orange:#e0993e;--yellow:#d9c84f;--green:#3dc97a;
  --blue:#4f8bd9;--purple:#9b59d9;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
body{font-size: 1.125rem;line-height: 1.6;font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Ambient noise texture */
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4}

/* Glow effect for header */
.header-glow{position:relative;overflow:hidden}
.header-glow::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 80%,rgba(94,162,247,0.06) 0%,transparent 60%);pointer-events:none}

/* Animations */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.block-card{animation:fadeSlideIn 0.35s ease both}
.block-card:nth-child(2){animation-delay:0.06s}
.block-card:nth-child(3){animation-delay:0.12s}
.block-card:nth-child(4){animation-delay:0.18s}

.topic-row{transition:background 0.15s,opacity 0.2s}
.topic-row:hover{background:rgba(94,162,247,0.04)}
.topic-check{transition:all 0.2s}
.topic-check.done{animation:pulse 0.3s ease}

/* Flash card */
.flash-card{transition:transform 0.2s,box-shadow 0.2s}
.flash-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.flash-card:active{transform:scale(0.98)}

/* Language selector */
.lang-btn{transition:all 0.15s}
.lang-btn:hover{background:var(--surface2) !important}
.lang-btn.active{background:var(--accent) !important;color:#fff !important}

/* Tab underline animation */
.tab-btn{position:relative;transition:color 0.2s}
.tab-btn::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);transform:scaleX(0);transition:transform 0.25s ease}
.tab-btn.active::after{transform:scaleX(1)}

/* Progress bar shimmer */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.progress-fill.complete{background:linear-gradient(90deg,#3dc97a,#4ade80,#3dc97a) !important;background-size:200% 100%;animation:shimmer 2s ease infinite}


/* Scrolling Banner */
@keyframes scrollBanner {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
/* Responsive */
@media(min-width:640px){.main-wrap{max-width:680px;margin:0 auto}}
@media(min-width:900px){.main-wrap{max-width:820px}}
</style>
</head>

    React.createElement("div", {style:{display:"flex", gap:8, marginBottom:20, overflowX:"auto", paddingBottom:8, scrollbarWidth:"none"}},

/* ═══════════════════════════════════════════
   APP
   ═══════════════════════════════════════════ */
function App(){
  const [lang,setLang]=useState(()=>localStorage.getItem("sp-lang")||"en");
  const [completed,setCompleted]=useState(()=>{try{return JSON.parse(localStorage.getItem("sp-done")||"{}")}catch{return{}}});
  const [confidence,setConfidence]=useState(()=>{try{return JSON.parse(localStorage.getItem("sp-conf")||"{}")}catch{return{}}});
  const [answeredCards,setAnsweredCards]=useState(()=>{try{return JSON.parse(localStorage.getItem("sp-cards-done")||"{}")}catch{return{}}});
  const [activeDay,setActiveDay]=useState(1);
  const [view,setView]=useState("map");
  const [strategyTab, setStrategyTab] = useState("tactics");
  const [flashIdx,setFlashIdx]=useState(0);
  const [revealed,setRevealed]=useState(false);
  const [langOpen,setLangOpen]=useState(false);
  const [langSearch,setLangSearch]=useState("");



  const t=T[lang]||T.en;

  useEffect(()=>{localStorage.setItem("sp-lang",lang)},[lang]);
  useEffect(()=>{localStorage.setItem("sp-done",JSON.stringify(completed))},[completed]);
  useEffect(()=>{localStorage.setItem("sp-conf",JSON.stringify(confidence))},[confidence]);
  useEffect(()=>{localStorage.setItem("sp-cards-done",JSON.stringify(answeredCards))},[answeredCards]);

  // Mock State Sync to Firebase/Supabase
  const syncToSupabase = React.useCallback((payload) => {
    console.log("[Supabase Sync Mock] Syncing state to cloud...", payload);
    // In a real app, this would be an async await fetch/supabase call
    setTimeout(() => {
      console.log("[Supabase Sync Mock] State synced successfully!");
    }, 500);
  }, []);

  useEffect(() => {
    syncToSupabase({ completed, confidence, answeredCards });
  }, [completed, confidence, answeredCards, syncToSupabase]);

  const toggle=(id)=>setCompleted(p=>({...p,[id]:!p[id]}));
  const toggleCard=(id)=>setAnsweredCards(p=>({...p,[id]:!p[id]}));
  const setConf=(bid,lv)=>setConfidence(p=>({...p,[bid]:lv}));

  const doneCount=ALL_TOPICS.filter(id=>completed[id]).length;
  const pct=Math.round(doneCount/ALL_TOPICS.length*100);

  const domainName=(did)=>did===0?t.dAll:t["d"+did]||"";
  const domainColor=(did)=>did===0?"#6d7490":(DOMAINS.find(d=>d.id===did)||{}).color||"#6d7490";

  const [flashCards, setFlashCards]=useState([]);

  const loadAndShuffle = (type) => {
    if (window.FLASHCARD_DATA) {
      const data = type === "ports" ? window.FLASHCARD_DATA.PORTS : window.FLASHCARD_DATA.ACRONYMS;
      const shuffled = [...data];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      setFlashCards(shuffled);
    } else {
      const script = document.createElement("script");
      script.src = "data.js";
      script.onload = () => {
        const data = type === "ports" ? window.FLASHCARD_DATA.PORTS : window.FLASHCARD_DATA.ACRONYMS;
        const shuffled = [...data];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        setFlashCards(shuffled);
      };
      document.body.appendChild(script);
    }
  };

  const confLabels=["",t.conf1,t.conf2,t.conf3,t.conf4];
  const confColors=["","#ef4444","#eab308","#22c55e","#8b5cf6"];

  const dayBlocks=BLOCKS.filter(b=>b.day===activeDay);
  const dayMeta=DAY_META.find(d=>d.day===activeDay);

  const [showBanner, setShowBanner] = useState(() => localStorage.getItem("sp-banner-dismissed") !== "true");
  useEffect(() => {
    if (!showBanner) localStorage.setItem("sp-banner-dismissed", "true");
  }, [showBanner]);

  const [chatOpen, setChatOpen] = useState(false);
  const [chatMessages, setChatMessages] = useState([{role: "bot", text: "Hello! I am your SY0-701 AI Tutor. How can I help you today?"}]);
  const [chatInput, setChatInput] = useState("");
  const [isChatLoading, setIsChatLoading] = useState(false);

  const handleChatSubmit = async (e) => {
    e.preventDefault();
    if (!chatInput.trim() || isChatLoading) return;

    const userInput = chatInput.trim();
    setChatMessages(prev => [...prev, {role: "user", text: userInput}]);
    setChatInput("");
    setIsChatLoading(true);

    try {
      const systemPrompt = `You are an expert CompTIA Security+ SY0-701 AI Tutor. Restrict your answers to the scope of the SY0-701 exam objectives (General Security Concepts, Threats/Vulnerabilities, Architecture, Operations, Governance/Risk). Do not answer questions outside of cybersecurity or this exam. Respond primarily in the language: ${T[lang]?._name || "English"}. User question: `;
      const fullPrompt = encodeURIComponent(systemPrompt + userInput);

      const res = await fetch("https://text.pollinations.ai/prompt/" + fullPrompt);
      if (!res.ok) throw new Error("API responded with an error");
      let botResponse = await res.text();
      
      // Strip Pollinations banner if present
      botResponse = botResponse.replace(/⚠️ \*\*IMPORTANT NOTICE\*\* ⚠️[\s\S]*?normally\.\s*/, "");

      setChatMessages(prev => [...prev, {role: "bot", text: botResponse.trim()}]);
    } catch (err) {
      console.error("Chat API Error:", err);
      setChatMessages(prev => [...prev, {role: "bot", text: "Sorry, I am having trouble connecting to my knowledge base right now. Please try again later."}]);
    } finally {
      setIsChatLoading(false);
    }
  };

  const [showResetModal, setShowResetModal] = useState(false);

  const resetBank = () => {
    setAnsweredCards({});
    setShowResetModal(false);

        React.createElement("p",{style:{fontSize:10,color:"var(--dim)",textAlign:"center",marginTop:20,lineHeight:1.5,padding:"0 20px"}},t.attribution),

        // Reset
        React.createElement("div",{style:{textAlign:"center",marginTop:12}},
          React.createElement("button",{onClick:()=>setShowResetModal(true),style:{
            background:"transparent",border:"1px solid var(--border)",borderRadius:6,
            padding:"8px 20px",color:"var(--dim)",fontSize:11,cursor:"pointer"}},t.resetAll)
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.error('ServiceWorker registration failed: ', err);
      });
    });
  }
</script>
</body>
</html>
