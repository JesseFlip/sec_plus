              React.createElement("span",{style:{fontSize:10,color:"var(--dim)",minWidth:60}},t.confidence),
              [1,2,3,4].map(lv=>
                React.createElement("button",{key:lv,onClick:()=>setConf(block.id,lv),style:{
                  padding:"3px 8px",borderRadius:4,border:"none",cursor:"pointer",fontSize:10,
                  background:cf===lv?confColors[lv]+"30":"var(--surface)",
                  color:cf===lv?confColors[lv]:"var(--dim)",fontWeight:cf===lv?700:400,
                  outline:cf===lv?"1px solid "+confColors[lv]+"50":"none"}},confLabels[lv])
              )
            )
          );
        }),

        // Attribution
        React.createElement("p",{style:{fontSize:10,color:"var(--dim)",textAlign:"center",marginTop:20,lineHeight:1.5,padding:"0 20px"}},t.attribution),

        // Reset
        React.createElement("div",{style:{textAlign:"center",marginTop:12}},
          React.createElement("button",{onClick:()=>setShowResetModal(true),style:{
            background:"transparent",border:"1px solid var(--border)",borderRadius:6,
            padding:"8px 20px",color:"var(--dim)",fontSize:11,cursor:"pointer"}},t.resetAll)
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.error('ServiceWorker registration failed: ', err);
      });
    });
  }
</script>
</body>
</html>
